services:
  api-gateway:
    build: { context: ./api-gateway, dockerfile: Dockerfile }
    ports: ["3000:3000"]
    environment:
      - PORT=3000
      - AUTH_SERVICE_URL=http://auth-service:3001
      - USERS_SERVICE_URL=http://users-service:3002
      - PRODUCTS_SERVICE_URL=http://products-service:3003
      - CART_SERVICE_URL=http://cart-service:3004
      - ORDERS_SERVICE_URL=http://orders-service:3005
      - PAYMENTS_SERVICE_URL=http://payments-service:3006
      - REVIEWS_SERVICE_URL=http://reviews-service:3007
      - FAVORITES_SERVICE_URL=http://favorites-service:3008
      - CONFIG_SERVICE_URL=http://config-service:3009
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - ALLOWED_ORIGINS=http://localhost:9090,http://localhost:8080,http://localhost:3000
    depends_on:
      auth-service: { condition: service_healthy }
      users-service: { condition: service_healthy }
      products-service: { condition: service_healthy }
      cart-service: { condition: service_healthy }
      orders-service: { condition: service_healthy }
      payments-service: { condition: service_healthy }
      reviews-service: { condition: service_healthy }
      favorites-service: { condition: service_healthy }
      config-service: { condition: service_healthy }
    networks: [baseshop-network]
    restart: unless-stopped

  auth-service:
    build: { context: ./auth-service, dockerfile: Dockerfile }
    environment:
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-24h}
      - DB_PATH=/app/data/auth.db
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@baseshop.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:9090,http://localhost:8080,http://localhost:3000}
      - RECAPTCHA_SECRET_KEY=${RECAPTCHA_SECRET_KEY:-}
      - RECAPTCHA_THRESHOLD=${RECAPTCHA_THRESHOLD:-0.5}
      - MOBILE_APP_SECRET=${MOBILE_APP_SECRET:-}
      - BREVO_SMTP_HOST=${BREVO_SMTP_HOST:-smtp-relay.brevo.com}
      - BREVO_SMTP_PORT=${BREVO_SMTP_PORT:-587}
      - BREVO_SMTP_USER=${BREVO_SMTP_USER:-}
      - BREVO_SMTP_PASS=${BREVO_SMTP_PASS:-}
      - BREVO_SENDER_EMAIL=${BREVO_SENDER_EMAIL:-noreply@baseshop.dev}
      - BREVO_SENDER_NAME=${BREVO_SENDER_NAME:-BaseShop}
    volumes: [auth-data:/app/data]
    networks: [baseshop-network]
    restart: unless-stopped

  users-service:
    build: { context: ./users-service, dockerfile: Dockerfile }
    environment:
      - PORT=3002
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - DB_PATH=/app/data/users.db
    volumes: [users-data:/app/data]
    networks: [baseshop-network]
    restart: unless-stopped

  products-service:
    build: { context: ./products-service, dockerfile: Dockerfile }
    environment:
      - PORT=3003
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - DB_PATH=/app/data/products.db
    volumes: [products-data:/app/data]
    networks: [baseshop-network]
    restart: unless-stopped

  cart-service:
    build: { context: ./cart-service, dockerfile: Dockerfile }
    environment:
      - PORT=3004
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - DB_PATH=/app/data/cart.db
    volumes: [cart-data:/app/data]
    networks: [baseshop-network]
    restart: unless-stopped

  orders-service:
    build: { context: ./orders-service, dockerfile: Dockerfile }
    environment:
      - PORT=3005
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - DB_PATH=/app/data/orders.db
    volumes: [orders-data:/app/data]
    networks: [baseshop-network]
    restart: unless-stopped

  payments-service:
    build: { context: ./payments-service, dockerfile: Dockerfile }
    environment:
      - PORT=3006
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - DB_PATH=/app/data/payments.db
      - PAYU_API_KEY=${PAYU_API_KEY:?Set PAYU_API_KEY in .env}
      - PAYU_API_LOGIN=${PAYU_API_LOGIN:?Set PAYU_API_LOGIN in .env}
      - PAYU_MERCHANT_ID=${PAYU_MERCHANT_ID:?Set PAYU_MERCHANT_ID in .env}
      - PAYU_ACCOUNT_ID=${PAYU_ACCOUNT_ID:?Set PAYU_ACCOUNT_ID in .env}
      - PAYU_IS_TEST=true
      - ORDERS_SERVICE_URL=http://orders-service:3005
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8080}
      - GATEWAY_URL=${GATEWAY_URL:-http://localhost:3000}
    volumes: [payments-data:/app/data]
    networks: [baseshop-network]
    restart: unless-stopped

  reviews-service:
    build: { context: ./reviews-service, dockerfile: Dockerfile }
    environment:
      - PORT=3007
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - DB_PATH=/app/data/reviews.db
    volumes: [reviews-data:/app/data]
    networks: [baseshop-network]
    restart: unless-stopped

  favorites-service:
    build: { context: ./favorites-service, dockerfile: Dockerfile }
    environment:
      - PORT=3008
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - DB_PATH=/app/data/favorites.db
    volumes: [favorites-data:/app/data]
    networks: [baseshop-network]
    restart: unless-stopped

  config-service:
    build: { context: ./config-service, dockerfile: Dockerfile }
    environment:
      - PORT=3009
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - DB_PATH=/app/data/config.db
    volumes: [config-data:/app/data]
    networks: [baseshop-network]
    restart: unless-stopped

volumes:
  auth-data:
  users-data:
  products-data:
  cart-data:
  orders-data:
  payments-data:
  reviews-data:
  favorites-data:
  config-data:

networks:
  baseshop-network:
    driver: bridge
